name: deploy docs
on:
  push:
    branches:
      - main
    paths:
      - packages/monopi__docs/**
      - docs/**
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    name: 📚 build docs
    runs-on: ubuntu-latest
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: 📦 install dependencies
        run: pnpm install --frozen-lockfile
      - name: 📚 build docs site
        run: pnpm --filter @monopi/docs build
      - name: 📤 upload pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/monopi__docs/dist
  deploy:
    name: 🚀 deploy docs
    permissions:
      contents: read # required for GitHub Pages deployment metadata
      pages: write # required to publish the built docs site to GitHub Pages
      id-token: write # required for GitHub Pages OIDC deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 deploy to github pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
