name: ci
on:
  push:
    branches:
      - main
      - prep/**
  pull_request:
    branches:
      - main
      - prep/**
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  commit-lint:
    name: 🧾 conventional commits
    runs-on: ubuntu-latest
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: 🧾 validate commit messages
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Conventional commit pattern: type(scope)?: description
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
            # Validate only real PR commits (exclude synthetic merge commits from refs/pull/*/merge).
            COMMITS=$(git log --format='%s' --no-merges "${BASE_SHA}..${HEAD_SHA}")
          else
            # On push, check only the head commit
            COMMITS=$(git log --format='%s' -1)
          fi

          FAILED=0
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::error::Invalid commit message: '$msg'"
              echo "  Must match: type(scope)?: description"
              echo "  Types: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
              FAILED=1
            fi
          done <<< "$COMMITS"

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "✅ All commit messages follow conventional commits"
  changeset:
    name: 📝 changeset check
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📝 check for changeset
        run: |
          CHANGESETS=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$CHANGESETS" -eq 0 ]; then
            echo "::error::No changeset found. Every change must include a changeset."
            echo ""
            echo "Run 'mc change' locally to create one, then commit the file."
            echo ""
            echo "Choose the change type:"
            echo "  major — Breaking changes"
            echo "  minor — New features"
            echo "  patch — Bug fixes, docs, refactors"
            exit 1
          fi
          echo "✅ Found $CHANGESETS changeset(s)"

          python3 - <<'PY'
          from pathlib import Path
          import sys

          allowed = {"major", "minor", "patch"}
          failed = False

          for path in sorted(Path(".changeset").glob("*.md")):
              if path.name == "README.md":
                  continue

              text = path.read_text(encoding="utf-8")
              if not text.startswith("---\n"):
                  print(f"::error file={path}::Missing opening frontmatter delimiter '---'")
                  failed = True
                  continue

              try:
                  _, frontmatter, _ = text.split("---", 2)
              except ValueError:
                  print(f"::error file={path}::Invalid changeset frontmatter")
                  failed = True
                  continue

              entries = []
              invalid_lines = []
              for raw_line in frontmatter.strip().splitlines():
                  line = raw_line.strip()
                  if not line:
                      continue
                  if ":" not in line:
                      invalid_lines.append(raw_line)
                      continue
                  key, value = line.split(":", 1)
                  key = key.strip().strip('"').strip("'")
                  entries.append((key, value.strip()))

              if invalid_lines:
                  print(f"::error file={path}::Invalid frontmatter line(s): {' | '.join(invalid_lines)}")
                  failed = True
                  continue

              if len(entries) != 1 or entries[0][0] != "monopi":
                  found = ", ".join(key for key, _ in entries) or "(none)"
                  print(
                      f"::error file={path}::This repo uses lockstep monochange versioning. "
                      f"Changesets must use exactly one frontmatter key: monopi. Found: {found}"
                  )
                  failed = True
                  continue

              change_type = entries[0][1]
              if change_type not in allowed:
                  print(
                      f"::error file={path}::Unsupported change type '{change_type}'. "
                      "Use one of: major, minor, patch"
                  )
                  failed = True

          if failed:
              print("Changeset frontmatter must be:\n---\nmonopi: patch|minor|major\n---")
              sys.exit(1)

          print("✅ All changesets use lockstep monopi frontmatter")
          PY
  dependency-review:
    name: 🔍 dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🕸️ check dependency graph availability
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          OWNER="${REPOSITORY%/*}"
          REPO="${REPOSITORY#*/}"
          TOTAL_COUNT="$(gh api graphql \
            -f query="query(\$owner: String!, \$name: String!) { repository(owner: \$owner, name: \$name) { dependencyGraphManifests(first: 1) { totalCount } } }" \
            -F owner="$OWNER" \
            -F name="$REPO" \
            --jq '.data.repository.dependencyGraphManifests.totalCount')"

          echo "total-count=$TOTAL_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_COUNT" -gt 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "✅ Dependency graph is available ($TOTAL_COUNT manifest(s) indexed)"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping dependency review because GitHub dependency graph manifests are unavailable for this repository. Enable Dependency graph in repository settings to enforce this check."
          fi
      - name: 🔍 review dependency changes
        if: steps.dependency-graph.outputs.available == 'true'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
  actions-security:
    name: 🔐 workflow security (actionlint + zizmor)
    runs-on: ubuntu-latest
    permissions:
      actions: read # required for zizmor online audits of workflow metadata
      contents: read # required for checkout and private-repo workflow reads
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: 🐹 setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          cache: false
          go-version: stable
      - name: 🧹 lint GitHub Actions workflows
        run: pnpm actions:lint
      - name: 🔐 audit GitHub Actions workflows
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          inputs: .github/workflows
          min-severity: low
          persona: pedantic
          version: 1.26.1

  docs:
    name: 📚 documentation reuse (mdt)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: 📦 install dependencies
        run: pnpm install --frozen-lockfile
      - name: 📚 check synchronized documentation blocks
        run: pnpm mdt check
  security:
    name: 🛡️ security checks
    runs-on: ubuntu-latest
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: 📦 install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🛡️ run dependency allowlist and vulnerability audit
        run: pnpm security:check
  lint:
    name: 🧹 lint & format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: 📦 install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🎨 run format check (oxfmt)
        run: pnpm format:check
      - name: 🧹 run lint (oxlint, strict)
        run: pnpm lint
  typecheck:
    name: 🔎 type check (tsgo)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: 📦 install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🏗️ build core for cli type resolution
        run: pnpm --filter @monopi/core build
      - name: 🔎 type check with tsgo
        run: pnpm typecheck
  test:
    name: 🧪 test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node:
          - 22
          - 24
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: 📦 install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🏗️ build core for cli test resolution
        run: pnpm --filter @monopi/core build
      - name: 🧪 run tests
        run: pnpm test
  coverage:
    name: 📈 coverage (codecov)
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for checkout and coverage source paths
      id-token: write # required for Codecov OIDC upload
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: 📦 install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🏗️ build core for cli test resolution
        run: pnpm --filter @monopi/core build
      - name: 📈 run tests with coverage
        run: pnpm test:coverage
      - name: ✅ enforce 100% patch coverage
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm tsx ./scripts/check-patch-coverage.ts --threshold 95 --lcov coverage/lcov.info
      - name: 📤 upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error
      - name: 📈 upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
          flags: repo
          name: repo-coverage
          use_oidc: true
  compat:
    name: 🤝 compatibility (pi ${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: min-0.80.3
            version: 0.80.3
          - label: current-0.80.3
            version: 0.80.3
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: 🤝 verify compatibility smoke suite
        env:
          PI_COMPAT_VERSION: ${{ matrix.version }}
        run: pnpm verify:pi-compat -- --version "$PI_COMPAT_VERSION"
  benchmark:
    name: ⏱️ benchmarks (typescript)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: 📦 install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🎯 determine impacted startup benchmark targets
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          mkdir -p coverage/benchmarks
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ]; then
            git diff --name-only "$BASE_SHA...$HEAD_SHA" > coverage/benchmarks/changed-files.txt
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only "$BEFORE_SHA...$HEAD_SHA" > coverage/benchmarks/changed-files.txt
          else
            git ls-files > coverage/benchmarks/changed-files.txt
          fi
          node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --experimental-strip-types \
            ./benchmarks/startup/select-targets.ts coverage/benchmarks/changed-files.txt \
            > coverage/benchmarks/startup-targets.json
          TARGETS=$(node --input-type=module -e "import fs from 'node:fs'; const report = JSON.parse(fs.readFileSync('coverage/benchmarks/startup-targets.json', 'utf8')); console.log(report.mode === 'all' ? 'all' : report.selectedExtensions.join(','));")
          FOCUSED=$(node --input-type=module -e "import fs from 'node:fs'; const report = JSON.parse(fs.readFileSync('coverage/benchmarks/startup-targets.json', 'utf8')); console.log(report.mode === 'all' ? 'all' : report.selectedFocusedBenchmarkIds.join(','));")
          echo "OH_PI_BENCH_EXTENSION_FILTER=$TARGETS" >> "$GITHUB_ENV"
          echo "OH_PI_BENCH_FOCUSED_FILTER=$FOCUSED" >> "$GITHUB_ENV"
      - name: ⏱️ run startup and runtime benchmark suites
        run: |
          pnpm bench:startup
          pnpm bench:runtime
          pnpm bench:extensions-render | tee coverage/benchmarks/extensions-render.txt
          pnpm bench:live-runtime | tee coverage/benchmarks/live-runtime.txt
      - name: 📝 append benchmark summary
        run: |
          # shellcheck disable=SC2129
          echo "## Startup benchmark targets" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat coverage/benchmarks/startup-targets.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat coverage/benchmarks/startup/startup-benchmarks.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat coverage/benchmarks/runtime/runtime-churn.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Extensions render microbench" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat coverage/benchmarks/extensions-render.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Live runtime microbench" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat coverage/benchmarks/live-runtime.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: 📤 upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-report
          path: coverage/benchmarks/
          if-no-files-found: error
  build:
    name: 🏗️ build
    runs-on: ubuntu-latest
    needs:
      - commit-lint
      - changeset
      - docs
      - security
      - lint
      - typecheck
      - test
      - compat
      - benchmark
      - actions-security
    if: "!failure() && !cancelled()"
    steps:
      - name: 📥 checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 📦 setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: 🟢 setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: 📦 install workspace dependencies
        run: pnpm install --force --link-workspace-packages
      - name: 🏗️ build all packages
        run: pnpm build
      - name: 🔎 verify dist output
        run: |
          test -f packages/monopi__core/dist/index.js || (echo "core dist/index.js missing" && exit 1)
          test -f packages/monopi__cli/dist/index.js || (echo "cli dist/index.js missing" && exit 1)
          test -f packages/monopi__cli/dist/bin/monopi.js || (echo "cli dist/bin/monopi.js missing" && exit 1)
          test -f packages/monopi__web-client/dist/index.js || (echo "web-client dist/index.js missing" && exit 1)
          test -f packages/monopi__web-server/dist/index.js || (echo "web-server dist/index.js missing" && exit 1)
      - name: 📦 verify compiled tarballs exclude test artifacts
        run: pnpm verify:compiled-tarballs
      - name: 📦 verify all published packages pack successfully
        run: pnpm verify:published-packages
      - name: 🚢 run publish dry-run
        run: pnpm -r publish --dry-run --no-git-checks
